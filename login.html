<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – RFI Portfolio</title>
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

  <div class="login-page">

    <!-- Left panel: branding -->
    <div class="brand-panel">
      <div class="brand-content">
        <div class="brand-logo">
          <i class="ti ti-chart-candlestick"></i>
        </div>
        <h1 class="brand-name">RFI Portfolio<br>Invest</h1>
        <p class="brand-tagline">Track your Indonesian stock portfolio — real-time prices, gain/loss, and charts in one place.</p>
        <div class="brand-stats">
          <div class="bstat"><span class="bnum">IDX</span><span class="blabel">Market</span></div>
          <div class="bstat"><span class="bnum">Real-time</span><span class="blabel">Prices</span></div>
          <div class="bstat"><span class="bnum">Secure</span><span class="blabel">Per-user data</span></div>
        </div>
      </div>
    </div>

    <!-- Right panel: login form -->
    <div class="form-panel">
      <div class="form-card">

        <div class="form-header">
          <h2>Welcome back</h2>
          <p>Sign in to your portfolio</p>
        </div>

        <!-- Google Sign In -->
        <button class="btn-google" id="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="divider"><span>or sign in with email</span></div>

        <!-- Email/Password form -->
        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <i class="ti ti-mail"></i>
            <input id="email" type="email" placeholder="you@email.com" autocomplete="email">
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="ti ti-lock"></i>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
            <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Show password">
              <i class="ti ti-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <div class="form-err" id="form-err"></div>

        <button class="btn-submit" id="btn-submit">
          <i class="ti ti-login"></i> Sign In
        </button>

        <div class="form-footer">
          Don't have an account? <a id="link-register">Create one</a>
        </div>

      </div>
    </div>

  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
